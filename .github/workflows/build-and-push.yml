name: Build and Push to GitHub Container Registry

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      
      - name: Run tests
        run: go test ./... -v
      
      - name: Run tests with coverage
        run: go test ./... -v -coverprofile=coverage.out -covermode=atomic
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      
      - name: Run go fmt
        run: gofmt -d . | head -20 && test -z "$(gofmt -l .)" || (echo "Go code is not formatted"; exit 1)
      
      - name: Run go vet
        run: go vet ./...
      
      - name: Build
        run: go build -v ./cmd/curator

  e2e:
    # Run the full E2E suite only on version tags — it is the final gate before
    # the image is published. Skipped on branch pushes and PRs (those are covered
    # by the standalone e2e.yml workflow). A skipped job is treated as success by
    # GitHub Actions, so build-and-push still runs normally on non-tag events.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run E2E smoke suite
        run: make test-e2e

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.ref_name }}
          path: tests/e2e/results/
          retention-days: 30

  build-and-push:
    needs: [test, lint, e2e]
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # drop SHA tag; branch prefix may be empty for tag events which produced invalid tag
            # type=sha,prefix={{branch}}-
            # for tag pushes, also tag the image with the literal ref name (e.g. v0.2.0)
            # NOTE: `type=ref,event=tag` already handles tagging. remove explicit raw tag to avoid empty value issues.
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Debug metadata
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "computed_tags=${{ steps.meta.outputs.tags }}"
          echo "computed_labels=${{ steps.meta.outputs.labels }}"

      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
