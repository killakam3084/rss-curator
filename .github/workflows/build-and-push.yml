name: Build and Push to GitHub Container Registry

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      # Required by dorny/test-reporter to post check annotations
      checks: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests
        run: |
          gotestsum --junitfile test-results.xml -- \
            ./... -coverprofile=coverage.out -covermode=atomic

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Go Unit Tests
          path: test-results.xml
          reporter: java-junit
          # Job failure comes from gotestsum above; reporter is for UI only.
          fail-on-error: false

      - name: Enforce coverage threshold
        run: |
          # Raise MIN_COVERAGE as test coverage improves over time.
          MIN_COVERAGE=15
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%  (minimum: ${MIN_COVERAGE}%)"
          if awk "BEGIN { exit !($COVERAGE + 0 < $MIN_COVERAGE) }"; then
            echo "::error::Coverage ${COVERAGE}% is below the ${MIN_COVERAGE}% minimum threshold."
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
      
      - name: Run go fmt
        run: gofmt -d . | head -20 && test -z "$(gofmt -l .)" || (echo "Go code is not formatted"; exit 1)
      
      - name: Run go vet
        run: go vet ./...
      
      - name: Build
        run: go build -v ./cmd/curator

  e2e:
    # Run the full E2E suite only on minor/major version tags (vX.Y.0) — these
    # represent intentional minor/major cuts and warrant the full gate before
    # publishing. Patch tags (vX.Y.Z where Z > 0) skip e2e so iteration is fast;
    # GitHub Actions treats a skipped dependency as success, so build-and-push
    # still runs normally for patch releases.
    if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref_name, '.0')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run E2E smoke suite
        run: make test-e2e

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ github.ref_name }}
          path: tests/e2e/results/
          retention-days: 30

  build-and-push:
    needs: [test, lint, e2e]
    # Run if test + lint succeeded regardless of whether e2e was skipped (patch
    # releases) or succeeded (minor/major releases). `success()` (the default)
    # would also skip this job when e2e is skipped, so we use the explicit
    # !failure() && !cancelled() idiom instead.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # drop SHA tag; branch prefix may be empty for tag events which produced invalid tag
            # type=sha,prefix={{branch}}-
            # Publish `latest` on default-branch pushes AND on any version tag push
            # (includes patch releases which skip e2e for faster iteration).
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/') }}
      
      - name: Debug metadata
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "computed_tags=${{ steps.meta.outputs.tags }}"
          echo "computed_labels=${{ steps.meta.outputs.labels }}"

      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
