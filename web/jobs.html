<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs — RSS Curator</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2322c55e'/%3E%3Cstop offset='100%25' stop-color='%2316a34a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ccircle cx='20' cy='44' r='4' fill='white'/%3E%3Cpath d='M20%2034a10%2010%200%200%201%2010%2010' fill='none' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M20%2024a20%2020%200%200%201%2020%2020' fill='none' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        curator: {
                            50: '#f0ffed',
                            100: '#dcffdb',
                            400: '#4ade80',
                            500: '#00ff41',
                            600: '#00dd38',
                            700: '#00bb2e',
                            900: '#003d10'
                        }
                    },
                    fontFamily: {
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .animate-pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    </style>
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen">
    <div id="jobs-app">
        <!-- Top Nav (full width — no sidebar on this page) -->
        <nav class="fixed top-0 left-0 right-0 z-40 h-14 bg-gray-950 border-b border-gray-800 flex items-center justify-between px-6">
            <!-- Left: back link + wordmark -->
            <div class="flex items-center gap-4">
                <a href="/" class="flex items-center gap-2 text-gray-400 hover:text-curator-500 transition-colors text-sm font-mono">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                    </svg>
                    curator
                </a>
                <span class="text-gray-700">|</span>
                <span class="text-lg font-bold font-mono text-curator-500">jobs</span>
            </div>
            <!-- Right: live indicator + logout -->
            <div class="flex items-center gap-4">
                <span class="flex items-center gap-2 text-xs font-mono text-gray-500">
                    <span :class="['w-2 h-2 rounded-full', sseConnected ? 'bg-curator-500 animate-pulse-dot' : 'bg-gray-600']"></span>
                    {{ sseConnected ? 'live' : 'connecting…' }}
                </span>
                <!-- Settings link -->
                <a href="/settings" title="Settings" class="p-2 rounded border border-transparent hover:bg-gray-800 hover:border-gray-700 text-gray-400 hover:text-curator-500 transition-colors duration-150">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </a>
                <form method="POST" action="/logout">
                    <button type="submit" class="px-3 py-1.5 rounded font-mono text-xs text-gray-500 hover:text-red-400 hover:bg-gray-800 border border-transparent hover:border-gray-700 transition-colors duration-150 uppercase tracking-widest">logout</button>
                </form>
            </div>
        </nav>

        <!-- Ops In-Progress Banner -->
        <ops-banner :running-jobs="runningJobs" :cancel-job-fn="cancelJob"></ops-banner>

        <!-- Content -->
        <main class="pt-14 p-6 max-w-5xl mx-auto">
            <!-- Page heading -->
            <div class="mb-6">
                <h1 class="text-2xl font-bold font-mono text-curator-500 mb-1">> jobs</h1>
                <p class="text-sm text-gray-500 font-mono">background task history — feed checks, rescores, backfills</p>
            </div>

            <!-- Global Jobs Rail -->
            <jobs-rail
                v-if="jobsRailVisible"
                class-name="bg-gray-900 border border-gray-800 rounded-lg shadow-lg p-4 mb-6"
                subtitle="live queue state and latest terminal result"
                right-label="global surface"
                :running-count="runningJobs.length"
                :failed-count="failedJobs.length"
                :cancelled-count="cancelledJobs.length"
                :batch-stats="batchStats"
                :rail-running-jobs="railRunningJobs"
                :latest-terminal-job="latestTerminalJob"
                :format-relative-fn="formatRelative"
                :job-summary-line-fn="jobSummaryLine"
            ></jobs-rail>

            <!-- Tabs -->
            <div class="flex gap-1 mb-4 bg-gray-900 border border-gray-800 rounded-lg p-1 w-fit">
                <button
                    v-for="tab in ['all', 'active', 'failed']" :key="tab"
                    @click="activeTab = tab"
                    :class="[
                        'px-4 py-1.5 rounded font-mono text-xs uppercase tracking-widest transition-colors duration-150 flex items-center gap-2',
                        activeTab === tab
                            ? 'bg-gray-800 text-curator-500 border border-gray-700'
                            : 'text-gray-500 hover:text-gray-300'
                    ]"
                >
                    {{ tab }}
                    <span
                        v-if="tabCount(tab) > 0"
                        :class="[
                            'px-1.5 py-0.5 rounded-full text-xs font-bold',
                            tab === 'failed' ? 'bg-red-900 text-red-300' :
                            tab === 'active' ? 'bg-curator-900 text-curator-500' : 'bg-gray-800 text-gray-400'
                        ]"
                    >{{ tabCount(tab) }}</span>
                </button>
            </div>

            <!-- Jobs table -->
            <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-x-auto">
                <!-- Empty state -->
                <div v-if="filteredJobs.length === 0" class="py-16 text-center">
                    <p class="font-mono text-gray-600 text-sm">no jobs found</p>
                </div>

                <!-- Table -->
                <table v-else class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-gray-800 text-xs font-mono text-gray-500 uppercase">
                            <th class="text-left px-4 py-3 w-4"></th>
                            <th class="text-left px-4 py-3">
                                <button @click="toggleSort('type')" class="flex items-center gap-1 hover:text-curator-500 transition-colors uppercase tracking-widest">
                                    type
                                    <span class="text-gray-600">{{ sortField === 'type' ? (sortDir === 'asc' ? '↑' : '↓') : '↕' }}</span>
                                </button>
                            </th>
                            <th class="text-left px-4 py-3">
                                <button @click="toggleSort('status')" class="flex items-center gap-1 hover:text-curator-500 transition-colors uppercase tracking-widest">
                                    status
                                    <span class="text-gray-600">{{ sortField === 'status' ? (sortDir === 'asc' ? '↑' : '↓') : '↕' }}</span>
                                </button>
                            </th>
                            <th class="text-left px-4 py-3">
                                <button @click="toggleSort('started')" class="flex items-center gap-1 hover:text-curator-500 transition-colors uppercase tracking-widest">
                                    started
                                    <span class="text-gray-600">{{ sortField === 'started' ? (sortDir === 'asc' ? '↑' : '↓') : '↕' }}</span>
                                </button>
                            </th>
                            <th class="text-left px-4 py-3">
                                <button @click="toggleSort('duration')" class="flex items-center gap-1 hover:text-curator-500 transition-colors uppercase tracking-widest">
                                    duration
                                    <span class="text-gray-600">{{ sortField === 'duration' ? (sortDir === 'asc' ? '↑' : '↓') : '↕' }}</span>
                                </button>
                            </th>
                            <th class="text-left px-4 py-3">output</th>
                            <th class="text-left px-4 py-3">actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-800">
                        <template v-for="job in sortedFilteredJobs" :key="job.id">
                            <tr
                                @click="toggleExpand(job.id)"
                                class="hover:bg-gray-800/40 cursor-pointer transition-colors duration-100"
                            >
                                <!-- expand chevron -->
                                <td class="px-4 py-3 text-gray-600">
                                    <svg :class="['w-3 h-3 transition-transform duration-150', expandedIds.has(job.id) ? 'rotate-90' : '']" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                                    </svg>
                                </td>
                                <!-- type badge -->
                                <td class="px-4 py-3">
                                    <span :class="[
                                        'px-2 py-0.5 rounded font-mono text-xs font-bold',
                                        job.type === 'feed_check'      ? 'bg-blue-900/60 text-blue-300' :
                                        job.type === 'rescore'         ? 'bg-purple-900/60 text-purple-300' :
                                        job.type === 'rescore_backfill'? 'bg-amber-900/60 text-amber-300' : 'bg-gray-700 text-gray-300'
                                    ]">{{ job.type }}</span>
                                </td>
                                <!-- status -->
                                <td class="px-4 py-3">
                                    <span class="flex items-center gap-2 font-mono text-xs">
                                        <span :class="[
                                            'w-2 h-2 rounded-full shrink-0',
                                            job.status === 'running'   ? 'bg-curator-500 animate-pulse-dot' :
                                            job.status === 'completed' ? 'bg-emerald-500' :
                                            job.status === 'cancelled' ? 'bg-amber-500' : 'bg-red-500'
                                        ]"></span>
                                        {{ job.status }}
                                    </span>
                                </td>
                                <!-- started -->
                                <td class="px-4 py-3 font-mono text-xs text-gray-400">{{ formatRelative(job.started_at) }}</td>
                                <!-- duration -->
                                <td class="px-4 py-3 font-mono text-xs text-gray-400">{{ duration(job) }}</td>
                                <!-- output -->
                                <td class="px-4 py-3 font-mono text-xs text-gray-400">{{ jobSummaryLine(job) }}</td>
                                <td class="px-4 py-3">
                                    <button
                                        v-if="job.status === 'running'"
                                        @click.stop="cancelJob(job.id)"
                                        :disabled="cancelingIds.has(job.id)"
                                        class="px-2 py-1 rounded border border-red-700 text-red-300 hover:bg-red-900/40 disabled:opacity-50 disabled:cursor-not-allowed font-mono text-xs transition-colors"
                                    >{{ cancelingIds.has(job.id) ? 'cancelling…' : 'cancel' }}</button>
                                    <span v-else class="font-mono text-xs text-gray-700">—</span>
                                </td>
                            </tr>
                            <!-- Expanded row -->
                            <tr v-if="expandedIds.has(job.id)" class="bg-gray-950/50">
                                <td colspan="7" class="px-8 py-4">
                                    <div class="font-mono text-xs text-gray-400 space-y-1">
                                        <p><span class="text-gray-600">id:</span> {{ job.id }}</p>
                                        <p><span class="text-gray-600">started_at:</span> {{ job.started_at }}</p>
                                        <p v-if="job.completed_at"><span class="text-gray-600">completed_at:</span> {{ job.completed_at }}</p>
                                        <p v-if="job.progress"><span class="text-gray-600">progress:</span> {{ job.progress }}</p>
                                        <p v-if="job.type === 'rematch' && job.summary?.no_longer_matches !== undefined"><span class="text-gray-600">no_longer_matches:</span> {{ job.summary.no_longer_matches }}</p>
                                        <p v-if="job.summary?.error_message" class="text-red-400"><span class="text-gray-600">error:</span> {{ job.summary.error_message }}</p>
                                        <p><span class="text-gray-600">summary:</span> {{ JSON.stringify(job.summary) }}</p>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Log Viewer Panel -->
            <log-viewer variant="panel" title="// job logs"></log-viewer>

            <!-- Footer note -->
            <p class="mt-4 text-xs font-mono text-gray-700 text-center">showing last {{ jobs.length }} jobs · updates live via SSE</p>
        </main>
    </div>

    <script src="components/log-viewer.js"></script>
    <script src="components/ops-banner.js"></script>
    <script src="components/jobs-rail.js"></script>
    <script>
    const { createApp, ref, computed, onMounted, reactive } = Vue;

    const jobsApp = createApp({
        setup() {
            const jobs = ref([]);
            const activeTab = ref('all');
            const expandedIds = reactive(new Set());
            const cancelingIds = reactive(new Set());
            const sseConnected = ref(false);
            let eventSource = null;

            const runningJobs = computed(() => jobs.value.filter(j => j.status === 'running'));
            const failedJobs = computed(() => jobs.value.filter(j => j.status === 'failed'));
            const cancelledJobs = computed(() => jobs.value.filter(j => j.status === 'cancelled'));
            const latestTerminalJob = computed(() => jobs.value.find(j => j.status !== 'running') || null);
            const railRunningJobs = computed(() => runningJobs.value.slice(0, 3));
            const jobsRailVisible = computed(() =>
                runningJobs.value.length > 0 ||
                failedJobs.value.length > 0 ||
                cancelledJobs.value.length > 0 ||
                latestTerminalJob.value !== null
            );

            // Batch progress tracking — counts jobs in the current/latest session
            // (jobs started within ~2s of the latest started_at time).
            const batchStats = computed(() => {
                const batchableTypes = ['rematch', 'rescore'];
                const allBatchJobs = jobs.value.filter(j => batchableTypes.includes(j.type));
                if (allBatchJobs.length === 0) return { total: 0, completed: 0, running: 0 };
                const latestStartTime = new Date(allBatchJobs[0].started_at).getTime();
                const batchWindow = 2000; // 2s window to detect batch boundaries
                const batchJobs = allBatchJobs.filter(j =>
                    Math.abs(new Date(j.started_at).getTime() - latestStartTime) <= batchWindow
                );
                const running = batchJobs.filter(j => j.status === 'running').length;
                const completed = batchJobs.filter(j => j.status === 'completed').length;
                return { total: batchJobs.length, running, completed };
            });

            // Dark mode: always dark on this page (follow system)
            const applyDark = () => {
                document.documentElement.classList.add('dark');
            };
            applyDark();

            const upsertJob = (job) => {
                const idx = jobs.value.findIndex(j => j.id === job.id);
                if (idx >= 0) jobs.value.splice(idx, 1, job);
                else jobs.value.unshift(job);
                if (job.status !== 'running') cancelingIds.delete(job.id);
                if (jobs.value.length > 200) jobs.value.splice(200);
            };

            const fetchJobs = async () => {
                try {
                    const res = await fetch('/api/jobs?limit=100');
                    if (!res.ok) return;
                    const data = await res.json();
                    (data || []).forEach(upsertJob);
                } catch (_) {}
            };

            const openStream = () => {
                if (eventSource) return;
                eventSource = new EventSource('/api/jobs/stream');
                eventSource.onopen = () => { sseConnected.value = true; };
                eventSource.onmessage = (e) => {
                    try { upsertJob(JSON.parse(e.data)); } catch (_) {}
                };
                eventSource.onerror = () => {
                    sseConnected.value = false;
                    eventSource.close();
                    eventSource = null;
                    setTimeout(openStream, 5000);
                };
            };

            const tabCount = (tab) => {
                if (tab === 'all')    return jobs.value.length;
                if (tab === 'active') return jobs.value.filter(j => j.status === 'running').length;
                if (tab === 'failed') return jobs.value.filter(j => j.status === 'failed').length;
                return 0;
            };

            const filteredJobs = computed(() => {
                if (activeTab.value === 'active') return jobs.value.filter(j => j.status === 'running');
                if (activeTab.value === 'failed') return jobs.value.filter(j => j.status === 'failed');
                return jobs.value;
            });

            const sortField = ref('started');
            const sortDir   = ref('desc');

            const toggleSort = (field) => {
                if (sortField.value === field) {
                    sortDir.value = sortDir.value === 'asc' ? 'desc' : 'asc';
                } else {
                    sortField.value = field;
                    sortDir.value = (field === 'started' || field === 'duration') ? 'desc' : 'asc';
                }
            };

            const sortedFilteredJobs = computed(() => {
                const list = [...filteredJobs.value];
                const dir = sortDir.value === 'asc' ? 1 : -1;
                list.sort((a, b) => {
                    let av, bv;
                    const durMs = j => j.completed_at
                        ? new Date(j.completed_at).getTime() - new Date(j.started_at).getTime()
                        : (j.status === 'running' ? Infinity : 0);
                    switch (sortField.value) {
                        case 'type':     av = a.type;     bv = b.type;     break;
                        case 'status':   av = a.status;   bv = b.status;   break;
                        case 'started':  av = new Date(a.started_at).getTime(); bv = new Date(b.started_at).getTime(); break;
                        case 'duration': av = durMs(a);   bv = durMs(b);   break;
                        default: return 0;
                    }
                    if (av < bv) return -dir;
                    if (av > bv) return  dir;
                    return 0;
                });
                return list;
            });

            const jobSummaryLine = (job) => {
                if (!job) return '—';
                if (job.status === 'running') return job.progress || 'running…';
                if (job.status === 'failed') return job.summary?.error_message || 'failed';
                const s = job.summary || {};
                if (job.status === 'cancelled') {
                    const parts = [];
                    if (job.type === 'feed_check') {
                        if ((s.items_found || 0) > 0) parts.push(`${s.items_found} found`);
                        if ((s.items_matched || 0) > 0) parts.push(`${s.items_matched} matched`);
                    } else if (job.type === 'rematch') {
                        if ((s.items_matched || 0) > 0) parts.push(`${s.items_matched} kept`);
                        const dropped = (s.items_found || 0) - (s.items_matched || 0);
                        if (dropped > 0) parts.push(`${dropped} no longer`);
                    } else if ((s.items_scored || 0) > 0) {
                        parts.push(`${s.items_scored} scored`);
                    }
                    return parts.length ? `cancelled — ${parts.join(' · ')}` : 'cancelled';
                }
                // completed
                if (job.type === 'feed_check') {
                    const parts = [];
                    if ((s.items_found || 0) > 0) parts.push(`${s.items_found} found`);
                    if ((s.items_matched || 0) > 0) parts.push(`${s.items_matched} matched`);
                    if ((s.items_scored || 0) > 0) parts.push(`${s.items_scored} scored`);
                    return parts.length ? parts.join(' · ') : 'no new items';
                }
                if (job.type === 'rescore') {
                    return (s.items_scored || 0) > 0 ? `${s.items_scored} scored` : 'nothing to score';
                }
                if (job.type === 'rescore_backfill') {
                    return (s.items_scored || 0) > 0 ? `${s.items_scored} scored` : 'up to date';
                }
                if (job.type === 'suggest_refresh') {
                    return 'cache refreshed';
                }
                if (job.type === 'rematch') {
                    const parts = [];
                    const kept = s.items_matched || 0;
                    const dropped = (s.items_found || 0) - kept;
                    if (kept > 0) parts.push(`${kept} kept`);
                    if (dropped > 0) parts.push(`${dropped} no longer`);
                    if ((s.items_scored || 0) > 0) parts.push(`${s.items_scored} scored`);
                    return parts.length ? parts.join(' · ') : 'completed';
                }
                // fallback
                const parts = [];
                if ((s.items_found || 0) > 0) parts.push(`${s.items_found} found`);
                if ((s.items_matched || 0) > 0) parts.push(`${s.items_matched} matched`);
                if ((s.items_scored || 0) > 0) parts.push(`${s.items_scored} scored`);
                if ((s.items_queued || 0) > 0) parts.push(`${s.items_queued} queued`);
                return parts.length ? parts.join(' · ') : 'completed';
            };

            const toggleExpand = (id) => {
                if (expandedIds.has(id)) expandedIds.delete(id);
                else expandedIds.add(id);
            };

            const formatRelative = (isoStr) => {
                if (!isoStr) return '—';
                const diff = Date.now() - new Date(isoStr).getTime();
                if (diff < 60000)   return 'just now';
                if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
                if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
                return Math.floor(diff / 86400000) + 'd ago';
            };

            const duration = (job) => {
                if (!job.completed_at) {
                    if (job.status === 'running') {
                        const ms = Date.now() - new Date(job.started_at).getTime();
                        return Math.floor(ms / 1000) + 's…';
                    }
                    return '—';
                }
                const ms = new Date(job.completed_at).getTime() - new Date(job.started_at).getTime();
                if (ms < 1000) return ms + 'ms';
                return (ms / 1000).toFixed(1) + 's';
            };

            const cancelJob = async (id) => {
                if (cancelingIds.has(id)) return;
                cancelingIds.add(id);
                try {
                    const res = await fetch(`/api/jobs/${id}/cancel`, { method: 'POST' });
                    if (!res.ok) cancelingIds.delete(id);
                } catch (_) {
                    cancelingIds.delete(id);
                }
            };

            onMounted(() => {
                fetchJobs();
                openStream();
            });

            return {
                jobs, activeTab, expandedIds, sseConnected,
                filteredJobs, sortedFilteredJobs, sortField, sortDir, toggleSort,
                tabCount, toggleExpand,
                formatRelative, duration, cancelJob, cancelingIds,
                runningJobs, failedJobs, cancelledJobs, latestTerminalJob,
                railRunningJobs, jobsRailVisible, batchStats, jobSummaryLine
            };
        }
    });

    if (window.registerLogViewerComponent) {
        window.registerLogViewerComponent(jobsApp);
    }
    if (window.registerJobsRailComponent) {
        window.registerJobsRailComponent(jobsApp);
    }
    if (window.registerOpsBannerComponent) {
        window.registerOpsBannerComponent(jobsApp);
    }

    jobsApp.mount('#jobs-app');
    </script>
</body>
</html>
