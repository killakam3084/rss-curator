<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rss-curator — login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2322c55e'/%3E%3Cstop offset='100%25' stop-color='%2316a34a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ccircle cx='20' cy='44' r='4' fill='white'/%3E%3Cpath d='M20%2034a10%2010%200%200%201%2010%2010' fill='none' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M20%2024a20%2020%200%200%201%2020%2020' fill='none' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        curator: {
                            50:  '#f0ffed',
                            100: '#dcffdb',
                            400: '#4ade80',
                            500: '#00ff41',
                            600: '#00dd38',
                            700: '#00bb2e',
                            900: '#003d10'
                        }
                    },
                    fontFamily: {
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Courier New', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Triangle background pattern -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <svg class="w-full h-full" preserveAspectRatio="none" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="triangles" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
                    <polygon points="0,0 100,200 200,200" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.04"/>
                    <polygon points="200,0 100,200 0,0" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.03"/>
                    <polygon points="100,0 100,200 200,100" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.02"/>
                </pattern>
            </defs>
            <rect width="1000" height="1000" fill="url(#triangles)"/>
        </svg>
    </div>

    <div class="w-full max-w-sm px-4">
        <!-- Wordmark -->
        <div class="text-center mb-8">
            <p class="text-curator-500 font-mono text-3xl font-bold tracking-tight">&gt; rss-curator</p>
            <p class="text-gray-600 font-mono text-xs mt-2 uppercase tracking-widest">authentication required</p>
        </div>

        <!-- Card -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl shadow-2xl p-8">

            <!-- Error banner (shown via JS when ?error=1) -->
            <div id="error-banner" class="hidden mb-6 px-4 py-3 rounded-lg bg-red-900/40 border border-red-700/60 text-red-400 font-mono text-sm">
                &#10007;&nbsp; invalid credentials &mdash; try again
            </div>

            <form method="POST" action="/login" class="space-y-5">
                <!-- next= param forwarded through hidden field -->
                <input type="hidden" name="next" id="next-input" value="">

                <!-- Username -->
                <div>
                    <label for="username" class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-2">username</label>
                    <input
                        id="username"
                        type="text"
                        name="username"
                        autocomplete="username"
                        required
                        autofocus
                        class="w-full bg-gray-800 border border-gray-700 focus:border-curator-500 focus:outline-none rounded-lg px-4 py-3 font-mono text-sm text-gray-100 placeholder-gray-600 transition-colors duration-150"
                        placeholder="username"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-xs font-mono text-gray-500 uppercase tracking-widest mb-2">password</label>
                    <input
                        id="password"
                        type="password"
                        name="password"
                        autocomplete="current-password"
                        required
                        class="w-full bg-gray-800 border border-gray-700 focus:border-curator-500 focus:outline-none rounded-lg px-4 py-3 font-mono text-sm text-gray-100 placeholder-gray-600 transition-colors duration-150"
                        placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
                    >
                </div>

                <!-- Submit -->
                <button
                    type="submit"
                    class="w-full bg-curator-500 hover:bg-curator-600 active:bg-curator-700 text-gray-900 font-mono font-bold text-sm uppercase tracking-widest rounded-lg px-4 py-3 transition-colors duration-150 mt-2"
                >
                    &#10003;&nbsp; authenticate
                </button>
            </form>
        </div>

        <p class="text-center text-gray-800 font-mono text-xs mt-6">rss-curator</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('error') === '1') {
            document.getElementById('error-banner').classList.remove('hidden');
        }
        const nextVal = params.get('next');
        if (nextVal) {
            document.getElementById('next-input').value = nextVal;
        }
    </script>
</body>
</html>
